<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreisliga Manager</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #f2f2f2;
    }

    /* 🔥 MINIMAL Desktop Fix */
 .container {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;

  max-width: 600px;
  margin: 0 auto;
}

/* 🔥 verhindert dass irgendwas gestretched wird */
.container > * {
  flex: 0 0 auto;
}

/* optional nice */
#adBanner {
  align-self: center;
}
    input, select, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2e7d32;
      color: white;
      font-weight: bold;
    }

    #score {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    #match {
      text-align: center;
      font-size: 16px;
    }

    #progressBar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: green;
    }

    #liveFeed {
      background: white;
      border-radius: 10px;
      padding: 10px;
      max-height: 250px;
      overflow-y: auto;
      font-size: 14px;
    }

    #liveFeed p {
      margin: 6px 0;
    }

    /* 🔥 ADS FIX (minimal, stabil) */
    #adBanner {
      width: 100%;
      height: 70px;
      background: #111;
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    #adTrack {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    .adItem img {
      height: 50px;
      max-width: 120px;
      object-fit: contain;
    }

  </style>

</head>
<body>

  <div class="container">

<input id="nameInput" placeholder="Dein Name">

<select id="leagueSelect"></select>
<select id="teamSelect"></select>
<div id="currentMatch"></div>

<button id="mainButton">Spiel starten</button>
<button onclick="saveGame()">Speichern</button>
<button onclick="loadGame()">Laden</button>
<button onclick="clearSave()">Reset</button>

<div id="score">0 : 0</div>
<div id="match"></div>

<div id="progressBar">
  <div id="progressFill"></div>
</div>

<div>
  <label><b>🎯 Taktik anpassen</b></label>
  <select id="tacticSelect">
    <option value="balanced">Ausgeglichen</option>
    <option value="offensive">Offensiv</option>
    <option value="defensive">Defensiv</option>
    <option value="pressing">Pressing</option>
    <option value="counter">Konter</option>
  </select>
</div>

<div id="schedule"></div>

<div id="liveFeed"></div>

<div id="table">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Team</th>
        <th>Sp</th>
        <th>Tore</th>
        <th>Diff</th>
        <th>Punkte</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- 📢 ADS -->
<div id="adBanner">
  <div class="adInner">
    <div id="adTrack"></div>
  </div>
</div>

  </div>

  <!-- 🧠 SCRIPTS (FIXED ORDER + defer) -->

 <script type="module" src="js/main.js"></script>
  
</body>
</html>
