<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreisliga Manager</title>

  <!-- ✅ DEINE EXTERNE CSS -->

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔥 NEU: App Wrapper -->

  <div class="appWrapper">
    
<!-- 🏆 HEADER -->
<div class="header">
  <div class="headerOverlay"></div>
  <div class="headerContent">
    <div>
      <div class="gameTitle">Kreisliga Manager</div>
      <div class="subTitle">Dein Weg nach oben</div>
    </div>
    <div id="menuBtn">☰</div>
  </div>
</div>

<!-- 📱 OVERLAY -->
<div id="overlay"></div>

<!-- 📱 SIDE PANEL -->
<div id="setupPanel">
  <div class="panel">
    <h2>Manager Setup</h2>

    <input id="nameInput" placeholder="Dein Name">
    <select id="leagueSelect"></select>
    <select id="teamSelect"></select>

    <button id="mainButton">Spiel starten</button>
    <button onclick="saveGame()">Speichern</button>
    <button onclick="loadGame()">Laden</button>
    <button onclick="clearSave()">Reset</button>
  </div>
</div>

<!-- 🧱 MAIN LAYOUT -->
<div class="layout">

  <!-- 🎮 MAIN PANEL -->
  <div class="mainPanel">

    <!-- ⚽ SCORE -->
    <div class="panel">
      <div class="scoreboard big">
        <div id="match"></div>
        <div id="score">0 : 0</div>
      </div>

      <!-- 📊 Momentum -->
      <div class="momentum">
        <div id="momentumBar"></div>
      </div>
    </div>

    <!-- 🎯 TAKTIK -->
    <div class="panel">
      <h2>🎯 Taktik</h2>
      <select id="tacticSelect">
        <option value="balanced">Ausgeglichen</option>
        <option value="offensive">Offensiv</option>
        <option value="defensive">Defensiv</option>
        <option value="pressing">Pressing</option>
        <option value="counter">Konter</option>
      </select>
    </div>

    <!-- 📺 LIVE MATCH -->
    <div class="panel">
      <h2>📺 Live-Spiel</h2>
      <div id="liveFeed" class="live"></div>
    </div>

  </div>

  <!-- 📊 SIDE PANEL -->
  <div class="sidePanel">

    <!-- 📅 SPIELPLAN -->
    <div class="panel">
      <h2>📅 Spielplan</h2>
      <div id="schedule"></div>
    </div>

    <!-- 🏆 TABELLE -->
    <div class="panel">
      <h2>🏆 Tabelle</h2>
      <table class="modernTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>Sp</th>
            <th>Tore</th>
            <th>Diff</th>
            <th>Punkte</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- 📢 ADS -->
    <div id="adBanner">
      <div id="adTrack"></div>
    </div>

  </div>

</div>

  </div>

  <!-- 🧠 SCRIPTS -->

  <script src="js/core/state.js"></script>

  <script src="js/ui/ui.js"></script>

  <script src="js/modules/league.js"></script>

  <script src="js/modules/table.js"></script>

  <script src="js/modules/scheduler.js"></script>

  <script src="js/services/storage.js"></script>

  <script src="js/core/engine.js"></script>

  <script src="js/ui/bindings.js" defer></script>

  <script src="js/modules/ads.js"></script>

  <script src="js/main.js"></script>

</body>
</html>
