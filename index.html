<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kreisliga Manager</h1>

<div class="container">

  <!-- LINKS -->
  <div class="panel">
    <h2>Liga</h2>
    <select id="leagueSelect">
      <option>Kreisliga A Herford</option>
    </select>
    <button onclick="selectLeague()">Liga starten</button>

    <h2>Team</h2>
    <select id="teamSelect"></select>
    <button onclick="selectTeam()">Übernehmen</button>

    <h2>Taktik</h2>
    <select id="tacticSelect">
      <option value="normal">Normal</option>
      <option value="offensive">Offensiv</option>
      <option value="defensive">Defensiv</option>
    </select>
    <button onclick="setTactic()">Speichern</button>

    <p id="currentTactic">Taktik: normal</p>

    <h3>Formation</h3>
    <select>
      <option>4-4-2</option>
      <option>4-3-3</option>
      <option>3-5-2</option>
    </select>
  </div>

  <!-- MITTE -->
  <div class="panel center">
    <h2 id="matchday">Spieltag: 0 / 30</h2>

    <button onclick="simulateMatchday()">▶ Spiel starten</button>

    <!-- SCOREBOARD -->
    <div class="scoreboard">
      <span id="team1Name">Team 1</span>
      <div id="score">0 : 0</div>
      <span id="team2Name">Team 2</span>
    </div>

    <!-- TIMELINE -->
    <div id="timeline">
      <div id="timelineBar"></div>
    </div>

    <!-- CONTROLS -->
    <div>
      <button id="btnAttack" onclick="setLiveMode('attack')">Druck</button>
      <button id="btnCalm" onclick="setLiveMode('calm')">Ruhig</button>
      <button onclick="makeSub()">Wechsel</button>
      <span id="subsLeft">Wechsel: 3</span>
    </div>

    <div>
      Geschwindigkeit:
      <button class="speedBtn" onclick="setSpeed(event,200)">3x</button>
      <button class="speedBtn" onclick="setSpeed(event,120)">5x</button>
      <button class="speedBtn" onclick="setSpeed(event,60)">10x</button>
      <button onclick="fastForward()">⏩</button>
    </div>

    <!-- LIVE -->
    <div id="liveMatch" class="live-box"></div>

    <!-- HALBZEIT -->
    <div id="halftimePanel" class="halftime">
      <h3>Halbzeit</h3>
      <select id="halfTactic">
        <option value="normal">Normal</option>
        <option value="offensive">Offensiv</option>
        <option value="defensive">Defensiv</option>
      </select>
      <button onclick="applyHalftime()">Weiter</button>
    </div>

  </div>

  <!-- RECHTS -->
  <div class="panel">
    <h2>Tabelle</h2>
    <table id="table">
      <thead>
        <tr>
          <th>Team</th>
          <th>Punkte</th>
          <th>Tore</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
