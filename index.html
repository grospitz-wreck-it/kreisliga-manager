<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔥 HEADER -->
  <h1 class="title">
    <img src="logos/nw_logo.png" class="logo">
    <span>Kreisliga Manager</span>
  </h1>

  <!-- 🔥 BURGER BUTTON -->
  <button id="menuBtn" onclick="toggleSetup()">☰</button>

  <!-- 🔥 SETUP OVERLAY -->
  <div id="setupPanel" class="setupOverlay">

    <h2>⚙️ Einstellungen</h2>

    <div class="setupGrid">

      <!-- Liga -->
      <div class="setupBox">
        <h3>Liga</h3>
        <select id="leagueSelect"></select>
        <button onclick="selectLeague()">Starten</button>
      </div>

      <!-- Team -->
      <div class="setupBox">
        <h3>Team</h3>
        <select id="teamSelect"></select>
        <button id="btnSelectTeam" onclick="selectTeam()">Übernehmen</button>
        <p id="selectedTeamText">-</p>
      </div>

      <!-- Taktik -->
      <div class="setupBox">
        <h3>Taktik</h3>
        <select id="tacticSelect">
          <option>Normal</option>
          <option>Offensiv</option>
          <option>Defensiv</option>
        </select>
        <button onclick="setTactic()">Speichern</button>
        <p id="currentTactic">Normal</p>
      </div>

      <!-- Formation -->
      <div class="setupBox">
        <h3>Formation</h3>
        <select id="formationSelect">
          <option>4-4-2</option>
          <option>4-3-3</option>
          <option>3-5-2</option>
          <option>5-3-2</option>
        </select>
        <button onclick="setFormation()">Setzen</button>
        <p id="currentFormation">4-4-2</p>
      </div>

    </div>

  </div>

  <!-- 🔥 HAUPTLAYOUT -->
  <div class="layout">

    <!-- GAME PANEL -->
    <div class="panel">

      <h2 id="matchday">Spieltag: 0 / 0</h2>
      <button id="startBtn" onclick="simulateMatchday()">▶ Saison starten</button>

      <div class="scoreboard">
        <div id="teamLeft">-</div>
        <div id="score">0 : 0</div>
        <div id="teamRight">-</div>
      </div>

      <div class="timeline">
        <div id="timelineBar"></div>
      </div>

      <div class="controls">
        <button id="btnAttack" onclick="setLiveMode('attack')">🔥 Druck</button>
        <button id="btnCalm" onclick="setLiveMode('calm')">🧊 Ruhig</button>
        <button onclick="makeSub()">🔄 Wechsel</button>
        <span id="subCount">Wechsel: 5</span>
      </div>

      <div class="controls">
        Geschwindigkeit:
        <button onclick="setSpeed(event,3)">3x</button>
        <button onclick="setSpeed(event,5)">5x</button>
        <button onclick="setSpeed(event,10)">10x</button>
      </div>

      <div id="liveMatch" class="live"></div>

      <!-- 📰 NEWS -->
      <div class="panel">
        <h2>📰 Spieltagsbericht</h2>
        <div id="newsBox" class="live"></div>
      </div>

      <!-- HALBZEIT -->
      <div id="halftimePanel" style="display:none;">
        <h3>Halbzeit</h3>
        <button onclick="setLiveMode('attack')">Mehr Druck</button>
        <button onclick="setLiveMode('calm')">Defensiver</button>
        <br><br>
        <button onclick="resumeMatch()">2. Halbzeit starten</button>
      </div>

    </div>

    <!-- TABELLE -->
    <div class="panel">
      <h2>Tabelle</h2>
      <table id="table">
        <thead>
          <tr>
            <th>Team</th>
            <th>Sp</th>
            <th>S</th>
            <th>U</th>
            <th>N</th>
            <th>Tore</th>
            <th>Diff</th>
            <th>Punkte</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="js/state.js"></script>
  <script src="js/league.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/matchEngine.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/floskeln.js"></script>
  <script src="js/news.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
