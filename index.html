<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
</head>
<body>

  <h2>Manager</h2>

  <div>
    <input id="nameInput" placeholder="Dein Name">
  </div>

  <div>
    <select id="leagueSelect"></select>
  </div>

  <div>
    <select id="teamSelect"></select>
  </div>

  <button id="mainButton">Start</button>

  <h3 id="match"></h3>

  <!-- 🔥 SCORE -->
  <h1 id="score">0 : 0</h1>

  <!-- 🔥 PROGRESS -->
  <div style="height:12px;background:#ccc;margin-top:10px;border-radius:6px;overflow:hidden;">
    <div id="progressFill" style="height:100%;width:0%;background:green;"></div>
  </div>

  <!-- 🔥 LIVE TICKER -->
  <div id="liveFeed" style="margin-top:15px;max-height:200px;overflow:auto;border:1px solid #ccc;padding:10px;">
  </div>

  <script src="js/core/state.js"></script>
  <script src="js/modules/league.js"></script>
  <script src="js/core/engine.js"></script>
  <script src="js/ui/ui.js"></script>
  <script src="js/ui/bindings.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
