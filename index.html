<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #f2f2f2;
    }

    /* =========================
       🟡 SPLASH
    ========================= */
    #splash {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 12px;
      background: #111;
      color: white;
      padding: 20px;
    }

    #splash input, #splash button {
      max-width: 300px;
    }

    /* =========================
       🔵 APP
    ========================= */
    #app {
      display: none;
    }

    .container {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    .container > * {
      flex: 0 0 auto;
    }

    /* =========================
       🧷 HEADER
    ========================= */
    #header {
      position: sticky;
      top: 0;
      background: #111;
      color: white;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    /* =========================
       🍔 SIDEBAR
    ========================= */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      height: 100%;
      background: #222;
      padding: 20px;
      transform: translateX(-100%);
      transition: transform 0.3s;
      z-index: 20;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    /* =========================
       🧱 FORM ELEMENTS
    ========================= */
    input, select, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2e7d32;
      color: white;
      font-weight: bold;
    }

    /* =========================
       ⚽ MATCH UI
    ========================= */
    #score {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    #match {
      text-align: center;
      font-size: 16px;
    }

    #progressBar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: green;
    }

    /* =========================
       📡 LIVE FEED
    ========================= */
    #liveFeed {
      background: white;
      border-radius: 10px;
      padding: 10px;
      max-height: 250px;
      overflow-y: auto;
      font-size: 14px;
    }

    #liveFeed p {
      margin: 6px 0;
    }

    /* =========================
       📢 ADS
    ========================= */
    #adBanner {
      width: 100%;
      height: 70px;
      background: #111;
      border-radius: 10px;
      padding: 8px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #adTrack {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .adItem img {
      height: 50px;
      max-width: 120px;
      object-fit: contain;
    }

  </style>

</head>

<body>

  <!-- =========================
       🟡 SPLASH SCREEN
  ========================= -->

<div id="splash">
  <img id="logo" src="/logos/logo_kickn.png" alt="Kickn Manager Logo">

  <input id="nameInput" placeholder="Dein Name">
  <button id="startBtn">Spiel starten</button>
</div>

  <!-- =========================
       🔵 APP
  ========================= -->

  <div id="app">

<!-- HEADER -->
<header id="header">
  <button id="burger">☰</button>
  <span id="headerTitle">Kreisliga Manager</span>
</header>

<!-- SIDEBAR -->
<div id="sidebar">
  <button id="saveBtn">💾 Speichern</button>
  <button id="loadBtn">📂 Laden</button>
  <button id="resetBtn">🗑 Reset</button>
</div>

<!-- CONTENT -->
<div class="container">

  <select id="leagueSelect"></select>
  <select id="teamSelect"></select>

  <div id="currentMatch"></div>

  <button id="mainButton">Spiel starten</button>

  <div id="score">0 : 0</div>
  <div id="match"></div>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>

  <div>
    <label><b>🎯 Taktik anpassen</b></label>
    <select id="tacticSelect">
      <option value="balanced">Ausgeglichen</option>
      <option value="offensive">Offensiv</option>
      <option value="defensive">Defensiv</option>
      <option value="pressing">Pressing</option>
      <option value="counter">Konter</option>
    </select>
  </div>

  <div id="schedule"></div>
  <div id="liveFeed"></div>

  <div id="table">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>Sp</th>
          <th>Tore</th>
          <th>Diff</th>
          <th>Punkte</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- ADS -->
  <div id="adBanner">
    <div id="adTrack"></div>
  </div>

</div>

  </div>

  <!-- =========================
       🧠 MAIN SCRIPT
  ========================= -->

  <script type="module" src="js/main.js"></script>

</body>
</html>
