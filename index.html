<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kreisliga Manager</h1>

<div class="container">

  <!-- LINKS -->
  <div class="panel">
    <h2>Liga wählen</h2>
    <select id="leagueSelect"></select>
    <button onclick="selectLeague()">Liga laden</button>

    <h2>Team</h2>
    <select id="teamSelect"></select>
    <button onclick="selectTeam()">Übernehmen</button>

    <h2>Taktik</h2>
    <select id="tacticSelect">
      <option value="normal">Normal</option>
      <option value="offensive">Offensiv</option>
      <option value="defensive">Defensiv</option>
    </select>
    <button onclick="setTactic()">Speichern</button>

    <p id="currentTactic"></p>
  </div>

  <!-- MITTE -->
  <div class="panel">
    <h2 id="matchday">Spieltag: 0</h2>
    <button onclick="simulateMatchday()">Spieltag simulieren</button>

    <h3>Live-Spiel</h3>
    <div id="liveMatch"></div>

    <h3>Letzter Spieltag</h3>
    <div id="results"></div>
  </div>

  <!-- RECHTS -->
  <div class="panel">
    <h2>Tabelle</h2>
    <table id="table">
      <thead>
        <tr>
          <th>Team</th>
          <th>Punkte</th>
          <th>Tore</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
