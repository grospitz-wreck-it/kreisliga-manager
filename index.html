<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSetup()"></div>

<!-- HEADER -->
<div class="header">
  <div class="headerOverlay"></div>

  <div class="headerContent">
    <div>
      <div class="gameTitle" id="gameTitle">Kreisliga Manager</div>
      <div class="subTitle" id="leagueTitle">Keine Liga gewählt</div>
    </div>

    <button id="menuBtn" onclick="toggleSetup()">☰</button>
  </div>
</div>

<!-- SETUP PANEL -->
<div id="setupPanel">
  <button class="closeBtn" onclick="closeSetup()">✖</button>

  <div class="menuTabs">
    <button class="tab active" onclick="openTab(event,'profil')">👤</button>
    <button class="tab" onclick="openTab(event,'freunde')">👥</button>
    <button class="tab" onclick="openTab(event,'game')">⚙️</button>
  </div>

  <div class="tabContent active" id="profil">
    <div class="setupBox">
      <h3>Profil</h3>
      <input id="nameInput" placeholder="Manager Name">
      <button onclick="changeName()">Speichern</button>
    </div>
  </div>

  <div class="tabContent" id="freunde">
    <div class="setupBox">
      <h3>Freunde</h3>
      <strong id="friendCodeDisplay">---</strong>
      <button onclick="copyFriendCode()">Kopieren</button>
      <input id="friendCodeInput" placeholder="Code">
      <button onclick="joinFriendCode()">Beitreten</button>
    </div>
  </div>

  <div class="tabContent" id="game">
    <div class="setupBox">
      <h3>Liga</h3>
      <select id="leagueSelect"></select>
      <button onclick="selectLeague()">Starten</button>
    </div>

    <div class="setupBox">
      <h3>Team</h3>
      <select id="teamSelect"></select>
      <button onclick="selectTeam()">Übernehmen</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="layout">

  <!-- GAME -->
  <div class="panel mainPanel">

    <h2 id="matchday">Spieltag: 0 / 30</h2>

    <button id="startBtn" onclick="simulateMatchdayWrapper()">
      ▶ Saison starten
    </button>

    <div class="scoreboard">
      <div id="teamLeft">-</div>
      <div id="score">0 : 0</div>
      <div id="teamRight">-</div>
    </div>

    <div class="timeline">
      <div id="timelineBar"></div>
    </div>

    <div class="controls">
      <button onclick="setLiveMode('attack')">🔥 Druck</button>
      <button onclick="setLiveMode('calm')">🧊 Ruhig</button>
      <button onclick="makeSub()">🔄 Wechsel</button>
    </div>

    <div class="controls">
      Geschwindigkeit:
      <button onclick="setSpeed(event, 1)">1x</button>
      <button onclick="setSpeed(event, 2)">2x</button>
      <button onclick="setSpeed(event, 4)">4x</button>
    </div>

    <!-- ✅ NUR ID, KEINE .live -->
    <div id="liveMatch"></div>

    <!-- ❌ Panel im Panel entfernt -->
    <div class="controls">
      <button onclick="setLiveMode('attack')">Mehr Druck</button>
      <button onclick="setLiveMode('calm')">Defensiver</button>
    </div>

    <div id="halftimePanel" style="display:none;">
      <h3>Halbzeit</h3>
      <button onclick="resumeMatch()">2. Halbzeit starten</button>
    </div>

  </div>

  <!-- SIDE -->
  <div class="sidePanel">

    <div class="panel">
      <h2>Tabelle</h2>
      <table id="table">
        <thead>
          <tr>
            <th>Team</th>
            <th>Sp</th>
            <th>S</th>
            <th>U</th>
            <th>N</th>
            <th>Tore</th>
            <th>Diff</th>
            <th>Punkte</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
<div class="panel">
  <h2>📢 Bandenwerbung</h2>
  <div id="adBanner">
    <div class="adTrack" id="adTrack"></div>
  </div>
</div>
    <div class="panel">
      <h2>📰 Spieltagsbericht</h2>
      <!-- ❌ .live entfernt -->
      <div id="newsBox"></div>
    </div>

  </div>

</div>
<div class="panel">
  <h2>🏆 Top 10 Manager</h2>

  <div>
    <button onclick="setLeaderboardMode('global')">🌍</button>
    <button onclick="setLeaderboardMode('league')">🏟️</button>
    <button onclick="setLeaderboardMode('friends')">👥</button>
  </div>

  <div id="leaderboard">Lade...</div>
</div>
<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>
<script src="js/state.js"></script>
<script src="js/league.js"></script>
<script src="js/ui.js"></script>
<script src="js/floskeln.js"></script>
<script src="js/news.js"></script>
<script src="js/matchEngine.js"></script>
<script src="js/controls.js"></script>
<script src="js/ads.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/main.js" defer></script>

</body>
</html>
