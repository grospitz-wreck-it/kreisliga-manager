<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
🌍 GLOBAL
========================= */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui;
  background: #f2f2f2;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* =========================
🟡 SPLASH
========================= */
#splash {
  display: flex;
  min-height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 20px;
  background: #000;
  color: white;
  padding: 20px;
  text-align: center;
  width: 100%;
}

#splash > * {
  width: 100%;
  max-width: 320px;
}

#logo {
  width: 70%;
  max-width: 220px;
  image-rendering: pixelated;
}

#splash input,
#splash select,
#splash button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

#splash input {
  background: #222;
  color: white;
}

#splash button {
  background: #2e7d32;
  color: white;
  font-weight: bold;
}

/* =========================
🔵 APP
========================= */
#app {
  display: none;
  width: 100%;
}

/* =========================
📦 CONTAINER
========================= */
.container {
  width: 100%;
  max-width: 420px; /* 🔥 ALLES gleiche Breite */
  margin: 0 auto;
  padding: 12px;

  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* =========================
🧷 HEADER
========================= */
#header {
  position: sticky;
  top: 0;
  background: #2e7d32;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: center;
  z-index: 10;
}

/* =========================
🍔 SIDEBAR
========================= */
#sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  height: 100%;
  background: #222;
  padding: 20px;
  transform: translateX(-100%);
  transition: transform 0.3s;
  z-index: 20;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

#sidebar.open {
  transform: translateX(0);
}

/* =========================
🧱 INPUTS
========================= */
input, select, button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* =========================
🎤 TOP BAR
========================= */
#topBar {
  background: #111;
  color: white;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

/* =========================
🎮 GAME CANVAS
========================= */
#gameCanvasWrapper {
  width: 100%;
}

#gameCanvas {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #0b5c2e;
  border-radius: 12px;
  display: block;
}

/* =========================
📢 EVENT + AD (FIX!)
========================= */
#eventBar {
  width: 100%;
  background: #111;
  color: white;
  border-radius: 12px;
  padding: 10px;

  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* TEXT */
#eventText {
  font-size: 14px;
}

/* AD CONTAINER */
#adContainer {
  width: 100%;
  height: 80px; /* 🔥 FIX HEIGHT */
  overflow: hidden;

  display: flex;
  align-items: center;
  justify-content: center;

  background: #000;
  border-radius: 8px;
}

/* AD CONTENT FIX */
#adContainer img,
#adContainer iframe {
  max-width: 100%;
  max-height: 100%;
  object-fit: cover;
  display: block;
}

/* =========================
⚽ REST UI
========================= */
#score {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
}

#progressBar {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: green;
}

#liveFeed {
  background: white;
  border-radius: 10px;
  padding: 10px;
  max-height: 250px;
  overflow-y: auto;
}

#table {
  background: white;
  border-radius: 10px;
  padding: 10px;
}

</style>
</head>

<body>

<!-- =========================
🟡 SPLASH
========================= -->
<div id="splash">
  <img id="logo" src="logos/logo_kickn.png">
  <input id="nameInput" placeholder="Dein Name">

  <select id="leagueSelect"></select>
  <select id="teamSelect"></select>

  <button id="startBtn">Spiel starten</button>
</div>

<!-- =========================
🔵 APP
========================= -->
<div id="app">

<header id="header">
  ☰ Kreisliga Manager
</header>

<div id="sidebar">
  <button id="saveBtn">💾 Speichern</button>
  <button id="loadBtn">📂 Laden</button>
  <button id="resetBtn">🗑 Reset</button>

  <hr>

  <select id="leagueSelectMenu"></select>
  <select id="teamSelectMenu"></select>
</div>

<div class="container">

  <!-- TOP -->
  <div id="topBar">
    <div id="topTeams">- vs -</div>
    <div id="topScore">0 : 0</div>
    <div id="topMinute">0'</div>
  </div>

  <!-- GAME -->
  <div id="gameCanvasWrapper">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- EVENT + AD -->
  <div id="eventBar">
    <div id="eventText">Willkommen im Spiel</div>
    <div id="adContainer"></div>
  </div>

  <!-- REST -->
  <button id="mainButton">Spiel starten</button>

  <div id="score">0 : 0</div>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>

  <select id="tacticSelect">
    <option value="balanced">Ausgeglichen</option>
    <option value="offensive">Offensiv</option>
    <option value="defensive">Defensiv</option>
    <option value="pressing">Pressing</option>
    <option value="counter">Konter</option>
  </select>

  <div id="liveFeed"></div>

  <div id="table">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>Sp</th>
          <th>Tore</th>
          <th>Diff</th>
          <th>Punkte</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
