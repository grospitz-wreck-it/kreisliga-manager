<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Kreisliga Manager</h1>

<div class="container">

  <!-- LINKS -->
  <div class="left">
    <h2>Liga wählen</h2>
    <select id="leagueSelect"></select>
    <button onclick="selectLeague()">Liga starten</button>

    <h2>Team</h2>
    <select id="teamSelect"></select>
    <button onclick="selectTeam()">Übernehmen</button>

    <h2>Taktik</h2>
    <select id="tacticSelect">
      <option value="normal">Normal</option>
      <option value="offensive">Offensiv</option>
      <option value="defensive">Defensiv</option>
    </select>
    <button onclick="setTactic()">Speichern</button>

    <p id="currentTactic">Taktik: normal</p>

    <h3>Formation</h3>
    <select id="formationSelect">
      <option value="442">4-4-2</option>
      <option value="433">4-3-3</option>
      <option value="532">5-3-2</option>
    </select>
  </div>

  <!-- MITTE -->
  <div class="middle">

    <h2 id="matchday">Spieltag: 0</h2>
    <button onclick="simulateMatchday()">▶ Spiel starten</button>

    <!-- SCORE -->
    <div id="scoreWrapper">
      <span id="team1Name">-</span>

      <div id="scoreboard">
        <span id="score">0 : 0</span>
      </div>

      <span id="team2Name">-</span>
    </div>

    <h3>Live-Spiel</h3>
    <div id="liveMatch"></div>

    <!-- HALBZEIT -->
    <div id="halftimePanel" style="display:none;">
      <h3>Halbzeit</h3>

      <label>Taktik:</label>
      <select id="halfTactic">
        <option value="normal">Normal</option>
        <option value="offensive">Offensiv</option>
        <option value="defensive">Defensiv</option>
      </select>

      <br><br>

      <label>Formation:</label>
      <select id="halfFormation">
        <option value="442">4-4-2</option>
        <option value="433">4-3-3</option>
        <option value="532">5-3-2</option>
      </select>

      <br><br>

      <button onclick="applyHalftime()">Weiter</button>
    </div>

    <h3>Letzter Spieltag</h3>
    <div id="results"></div>

  </div>

  <!-- RECHTS -->
  <div class="right">
    <h2>Tabelle</h2>

    <table id="table">
      <thead>
        <tr>
          <th>Team</th>
          <th>Punkte</th>
          <th>Tore</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>
<h3>NW-Spiel-Ticker ⚽</h3>
<div id="ticker"></div>
<script src="script.js"></script>

</body>
</html>
