<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" onclick="closeSetup()"></div>

<!-- HEADER -->
<div class="header">
  <div class="headerOverlay"></div>

  <div class="headerContent">
    <div>
      <div class="gameTitle" id="gameTitle">Kreisliga Manager</div>
      <div class="subTitle" id="leagueTitle">Keine Liga gewählt</div>
    </div>

    <button id="menuBtn">☰</button>
  </div>
</div>

<!-- SETUP PANEL -->
<div id="setupPanel">
  <button class="closeBtn">✖</button>

  <div class="menuTabs">
    <button class="tab active" data-tab="profil">👤</button>
    <button class="tab" data-tab="freunde">👥</button>
  </div>

  <div class="tabContent active" id="profil">

    <div class="setupBox">
      <h3>👤 Profil</h3>
      <input id="nameInput" placeholder="Manager Name">
      <button id="saveNameBtn">Speichern</button>
    </div>

    <div class="setupBox">
      <h3>🏆 Liga</h3>
      <select id="leagueSelect"></select>
      <button id="startLeagueBtn">Liga starten</button>
    </div>

    <div class="setupBox">
      <h3>⚽ Team</h3>
      <select id="teamSelect"></select>
      <button id="selectTeamBtn">Team übernehmen</button>
      <p id="selectedTeamText">-</p>
    </div>

    <div class="setupBox">
      <button class="danger" id="resetBtn">🧨 Neues Spiel starten</button>
    </div>

  </div>

  <div class="tabContent" id="freunde">
    <div class="setupBox">
      <h3>👥 Freunde</h3>

      <div class="infoRow">
        <span>Dein Code:</span>
        <strong id="friendCodeDisplay">---</strong>
      </div>

      <button id="copyCodeBtn">📋 Kopieren</button>

      <input id="friendCodeInput" placeholder="Freundescode">
      <button id="joinCodeBtn">Beitreten</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="layout">

  <!-- 🎮 GAME -->
  <div class="panel mainPanel">

    <div class="scoreboard big">
      <div id="teamLeft">-</div>
      <div id="score">0 : 0</div>
      <div id="teamRight">-</div>
    </div>

    <div class="momentum">
      <div id="momentumBar"></div>
    </div>

    <div id="liveMatch" class="live"></div>

    <!-- 🎮 CONTROL -->
    <div class="controlDesk">

      <div class="quickActions">
        <button class="btn attack" data-mode="attack">🔥 Druck</button>
        <button class="btn calm" data-mode="calm">❄️ Ruhig</button>
        <button class="btn counter" data-mode="counter">⚡ Konter</button>
      </div>

      <div class="settingsRow">

        <div>
          <label>Taktik</label>
          <select id="tacticSelect">
            <option>Normal</option>
            <option>Offensiv</option>
            <option>Defensiv</option>
          </select>
        </div>

        <div>
          <label>Formation</label>
          <select id="formationSelect">
            <option>4-4-2</option>
            <option>4-3-3</option>
            <option>3-5-2</option>
            <option>5-3-2</option>
          </select>
        </div>

        <div>
          <label>Wechsel</label>
          <button id="subBtn">🔄</button>
        </div>

      </div>

      <div class="intensity">
        <label>Intensität</label>
        <input type="range" min="1" max="3" value="2" id="intensitySlider">
        <div class="labels">
          <span>Defensiv</span>
          <span>Balanced</span>
          <span>All-in</span>
        </div>
      </div>

      <!-- SPEED -->
      <div class="speedControl">
        <span>⏱</span>
        <button data-speed="1">1x</button>
        <button data-speed="3">3x</button>
        <button data-speed="5">5x</button>
      </div>

      <!-- ⭐ MAIN BUTTON -->
      <div class="primaryAction">
        <button id="mainButton">▶ Saison starten</button>
      </div>

    </div>

    <!-- NEWS -->
    <div class="panel">
      <h2>📰 Spieltagsbericht</h2>
      <div id="newsBox"></div>
    </div>

  </div>

  <!-- 📊 SIDE -->
  <div class="sidePanel">

    <div class="panel">
      <h2>Tabelle</h2>
      <table id="table" class="modernTable">
        <thead>
          <tr>
            <th>Team</th>
            <th>Sp</th>
            <th>S</th>
            <th>U</th>
            <th>N</th>
            <th>Tore</th>
            <th>Diff</th>
            <th>Punkte</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>📢 Bandenwerbung</h2>
      <div id="adBanner">
        <div class="adTrack" id="adTrack"></div>
      </div>
    </div>

    <div class="panel">
      <h2>🏆 Top 10 Manager</h2>

      <div>
        <button data-lb="global">🌍</button>
        <button data-lb="league">🏟️</button>
        <button data-lb="friends">👥</button>
      </div>

      <div id="leaderboard">Lade...</div>
    </div>

  </div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/supabase.js" defer></script>
<script src="js/league.js" defer></script>
<script src="js/floskeln.js" defer></script>
<script src="js/news.js" defer></script>
<script src="js/controls.js" defer></script>
<script src="js/ads.js" defer></script>
<script src="js/leaderboard.js" defer></script>
<script src="js/state.js" defer></script>
<script src="js/matchEngine.js" defer></script>
<script src="js/ui.js" defer></script>
<script src="js/main.js" defer></script>

</body>
</html>
