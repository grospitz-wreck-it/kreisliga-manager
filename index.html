<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kreisliga Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kreisliga Manager</h1>

<div class="layout">

  <!-- LINKS -->
  <div class="panel">
    <h2>Liga</h2>
    <select id="leagueSelect"></select>
    <button onclick="selectLeague()">Liga starten</button>

    <h2>Team</h2>
    <select id="teamSelect"></select>
    <button onclick="selectTeam()">Übernehmen</button>

    <h2>Taktik</h2>
    <select id="tacticSelect">
      <option value="normal">Normal</option>
      <option value="offensive">Offensiv</option>
      <option value="defensive">Defensiv</option>
    </select>
    <button onclick="setTactic()">Speichern</button>

    <p id="currentTactic"></p>

    <h3>Formation</h3>
    <select id="formationSelect">
      <option>4-4-2</option>
      <option>4-3-3</option>
      <option>5-3-2</option>
    </select>
  </div>

  <!-- MITTE -->
  <div class="panel center">
    <h2 id="matchday">Spieltag: 0</h2>
    <button onclick="simulateMatchday()">▶ Spiel starten</button>

    <div class="scoreboard">
      <span id="team1Name"></span>
      <div id="score">0 : 0</div>
      <span id="team2Name"></span>
    </div>

    <div class="timeline">
      <div id="timelineBar"></div>
    </div>

    <div class="controls">
      <button onclick="setLiveMode('attack')">🔥 Druck</button>
      <button onclick="setLiveMode('calm')">🧊 Ruhig</button>
      <button onclick="makeSub()">🔄 Wechsel</button>
      <span id="subCount">Wechsel: 5</span>
    </div>

    <div>
      Geschwindigkeit:
      <button onclick="setSpeed(event,100)">3x</button>
      <button onclick="setSpeed(event,50)">5x</button>
      <button onclick="setSpeed(event,20)">10x</button>
    </div>

    <div id="liveMatch" class="live"></div>

    <div id="halftimePanel" style="display:none;">
      <h3>Halbzeit</h3>
      <button onclick="applyHalftime()">Weiter</button>
    </div>

  </div>

  <!-- RECHTS -->
  <div class="panel">
    <h2>Tabelle</h2>
    <table id="table">
      <thead>
        <tr><th>Team</th><th>Punkte</th><th>Tore</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="js/state.js"></script>
<script src="js/league.js"></script>
<script src="js/ui.js"></script>
<script src="js/matchEngine.js"></script>
<script src="js/controls.js"></script>
<script src="js/main.js"></script>

</body>
</html>
