<!DOCTYPE html>
    <div class="scoreboard">
      <span id="teamLeft"></span>
      <div id="score">0 : 0</div>
      <span id="teamRight"></span>
    </div>

    <div class="timeline">
      <div id="timelineBar"></div>
    </div>

    <div class="controls">
      <button id="btnAttack">🔥 Druck</button>
      <button id="btnCalm">🧊 Ruhig</button>
      <button id="btnSub">🔄 Wechsel</button>
      <span id="subCount">Wechsel: 5</span>
    </div>

    <div>
      Geschwindigkeit:
      <button class="speed" data-speed="3">3x</button>
      <button class="speed" data-speed="5">5x</button>
      <button class="speed" data-speed="10">10x</button>
    </div>

    <div id="liveMatch" class="live"></div>

    <div id="halftimePanel" style="display:none;">
      <h3>Halbzeit</h3>
      <button id="halfAttack">Mehr Druck</button>
      <button id="halfCalm">Defensiver</button>
      <br><br>
      <button id="resumeBtn">2. Halbzeit starten</button>
    </div>

  </div>

  <div class="panel">
    <h2>Tabelle</h2>
    <table id="table">
      <thead>
        <tr>
          <th>Team</th>
          <th>Punkte</th>
          <th>Tore</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="js/state.js"></script>
<script src="js/league.js"></script>
<script src="js/ui.js"></script>
<script src="js/matchEngine.js"></script>
<script src="js/controls.js"></script>
<script src="js/main.js"></script>

</body>
</html>
