<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ad System V2</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',system-ui;
  background:#f5f7fb;
  margin:0;
  color:#1a1a1a;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

.box{
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input,select{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  width:100%;
}

input:focus,select:focus{
  outline:none;
  border-color:#4CAF50;
  box-shadow:0 0 0 3px rgba(76,175,80,0.15);
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#43a047;
}

button.danger{
  background:#e53935;
}

.targeting{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.targeting label{
  background:#f1f3f7;
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  cursor:pointer;
}

.adRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.04);
  margin-bottom:10px;
}

.adLeft{
  display:flex;
  gap:15px;
  align-items:center;
}

.adRow img{
  height:50px;
  border-radius:8px;
}

small{
  color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Ad System Dashboard</h1>

<!-- ===================== -->
<!-- CREATE -->
<!-- ===================== -->
<div class="box">
<h2>Neue Kampagne</h2>

<div class="grid">
<input id="name" placeholder="Kampagnenname">
<input id="customer" placeholder="Kunde">
<input id="budget" type="number" placeholder="Budget €">
<select id="type">
<option value="TKP">TKP</option>
<option value="SPONSOR">Sponsor</option>
</select>
</div>

<h3>🎯 Targeting</h3>

<div class="targeting">
<label><input type="checkbox" id="global"> Global</label>
<label><input type="checkbox" id="country"> Deutschland</label>
<label><input type="checkbox" id="state"> Bundesland</label>
<label><input type="checkbox" id="district"> Kreis</label>
<label><input type="checkbox" id="team"> Mannschaft</label>
</div>

<br>

<select id="leagueSelect"></select>
<select id="teamSelect"></select>

<input id="donation" type="number" placeholder="Spende %" value="0">

<input type="file" id="image">

<button onclick="createCampaign()">💾 Kampagne speichern</button>
</div>

<!-- ===================== -->
<!-- LIST -->
<!-- ===================== -->
<div class="box">
<h2>📊 Kampagnen</h2>
<div id="list"></div>
</div>

</div>

<script>
const KEY="ad_v2";

function getData(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function saveData(d){localStorage.setItem(KEY,JSON.stringify(d))}

// =====================
// LEAGUES
// =====================
function loadLeagues(){

 if(!window.LEAGUES) return;

 leagueSelect.innerHTML=`<option value="">Liga wählen</option>`;

 Object.keys(LEAGUES).forEach(key=>{
  const opt=document.createElement("option");
  opt.value=key;
  opt.textContent=LEAGUES[key].name;
  leagueSelect.appendChild(opt);
 });

 leagueSelect.onchange=()=>{
  teamSelect.innerHTML=`<option value="">Team wählen</option>`;

  const key=leagueSelect.value;
  if(!key) return;

  LEAGUES[key].teams.forEach(t=>{
    const opt=document.createElement("option");
    opt.value=t;
    opt.textContent=t;
    teamSelect.appendChild(opt);
  });
 };
}

// =====================
// CPM
// =====================
function getCPM(t){
 if(t.team) return 20;
 if(t.district) return 10;
 if(t.state) return 5;
 if(t.country) return 2;
 return 1;
}

// =====================
// CREATE
// =====================
function createCampaign(){

 const file=image.files[0];
 if(!file) return alert("Bild fehlt");

 const reader=new FileReader();

 reader.onload=function(e){

 const targeting={
  global:global.checked,
  country:country.checked,
  state:state.checked,
  district:district.checked,
  team:team.checked
 };

 const cpm=getCPM(targeting);
 const b=parseFloat(budget.value);

 const c={
  id:Date.now(),
  name:name.value,
  customer:customer.value,
  budget:b,
  spent:0,
  type:type.value,
  cpm,
  impressionsBooked:(b/cpm)*1000,
  impressionsDelivered:0,
  donation:parseFloat(donation.value)||0,
  targeting,
  leagueId:leagueSelect.value,
  teamId:teamSelect.value,
  start:Date.now(),
  end:Date.now()+1000*60*60*24*30,
  image:e.target.result
 };

 const d=getData();
 d.push(c);
 saveData(d);
 render();
 };

 reader.readAsDataURL(file);
}

// =====================
// MATCH
// =====================
function match(c,ctx){
 if(c.teamId) return c.teamId===ctx.team;
 if(c.leagueId) return c.leagueId===ctx.league;
 return true;
}

// =====================
// SERVE
// =====================
function serveAd(ctx={}){

 let d=getData();

 d=d.filter(c=>{
  if(c.type==="TKP" && c.impressionsDelivered>=c.impressionsBooked) return false;
  return true;
 });

 d=d.filter(c=>match(c,ctx));

 if(!d.length) return null;

 const c=d[Math.floor(Math.random()*d.length)];

 c.impressionsDelivered++;
 if(c.type==="TKP") c.spent+=c.cpm/1000;

 saveData(d);
 return c;
}

// =====================
// RENDER UI
// =====================
function render(){

 list.innerHTML="";

 getData().forEach(c=>{

 const div=document.createElement("div");
 div.className="adRow";

 div.innerHTML=`
 <div class="adLeft">
  <img src="${c.image}">
  <div>
   <b>${c.name}</b><br>
   <small>${c.customer}</small><br>
   <small>${c.leagueId||"Global"} / ${c.teamId||"-"}</small>
  </div>
 </div>

 <div>
  €${c.spent.toFixed(2)}<br>
  <button class="danger" onclick="del(${c.id})">❌</button>
 </div>
 `;

 list.appendChild(div);
 });
}

function del(id){
 let d=getData();
 d=d.filter(x=>x.id!==id);
 saveData(d);
 render();
}

// =====================
// INIT
// =====================
render();
loadLeagues();
</script>

</body>
</html>
