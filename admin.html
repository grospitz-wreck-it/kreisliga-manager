<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Ad Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<h1>📢 Ad Verwaltung</h1>

<div class="form">

  <input type="text" id="adName" placeholder="Name">

  <input type="text" id="adLink" placeholder="Link (optional)">

  <input type="date" id="adStart">
  <input type="date" id="adEnd">

  <input type="number" id="adWeight" placeholder="Gewichtung" value="1">

  <input type="file" id="adImageUpload" accept="image/*">

  <button onclick="saveAd()">➕ Ad speichern</button>

</div>

<hr>

<h2>📺 Vorschau</h2>
<div id="preview"></div>

<hr>

<h2>📋 Aktive Ads</h2>
<div id="adList"></div>

<script src="js/ads.js"></script>
<script src="js/adminAds.js"></script>

</body>
</html>
