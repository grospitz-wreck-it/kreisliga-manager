<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ad System V2</title>
<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px}
input,select{margin:5px;padding:8px}
.box{background:#222;padding:15px;margin:10px 0}
button{cursor:pointer}
</style>
</head>
<body>

<h1>🚀 Ad System V2 (Full)</h1>

<div class="box">
<h2>Neue Kampagne</h2>

<input id="name" placeholder="Name">
<input id="customer" placeholder="Kunde">
<input id="budget" type="number" placeholder="Budget €">

<select id="type">
<option value="TKP">TKP</option>
<option value="SPONSOR">Sponsor</option>
</select>

<h3>🌍 Targeting</h3>

<label><input type="checkbox" id="global"> Global</label>
<label><input type="checkbox" id="country"> Deutschland</label>
<label><input type="checkbox" id="state"> Bundesland</label>
<label><input type="checkbox" id="district"> Kreis</label>
<label><input type="checkbox" id="team"> Mannschaft</label>

<br><br>

<!-- 🔥 NEU: ECHTES TARGETING -->
<select id="leagueSelect">
<option value="">-- Liga wählen --</option>
</select>

<select id="teamSelect">
<option value="">-- Team wählen --</option>
</select>

<br>

<input id="donation" type="number" placeholder="Spende %" value="0">

<h3>Banner</h3>
<input type="file" id="image">

<button onclick="createCampaign()">Speichern</button>
</div>

<div class="box">
<h2>📊 Kampagnen</h2>
<div id="list"></div>
</div>

<script>
const KEY="ad_v2";

// =====================
// 📦 LOAD / SAVE
// =====================
function getData(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function saveData(d){localStorage.setItem(KEY,JSON.stringify(d))}

// =====================
// 🔥 LEAGUES LADEN
// =====================
function loadLeagues(){

 if(!window.LEAGUES){
  console.warn("LEAGUES fehlt");
  return;
 }

 const leagueSelect=document.getElementById("leagueSelect");
 const teamSelect=document.getElementById("teamSelect");

 leagueSelect.innerHTML=`<option value="">-- Liga wählen --</option>`;

 Object.keys(LEAGUES).forEach(key=>{
  const opt=document.createElement("option");
  opt.value=key;
  opt.textContent=LEAGUES[key].name;
  leagueSelect.appendChild(opt);
 });

 leagueSelect.addEventListener("change",()=>{
  const key=leagueSelect.value;

  teamSelect.innerHTML=`<option value="">-- Team wählen --</option>`;

  if(!key) return;

  LEAGUES[key].teams.forEach(team=>{
    const opt=document.createElement("option");
    opt.value=team;
    opt.textContent=team;
    teamSelect.appendChild(opt);
  });
 });
}

// =====================
// CPM LOGIK
// =====================
function getCPM(t){
 if(t.team) return 20;
 if(t.district) return 10;
 if(t.state) return 5;
 if(t.country) return 2;
 return 1;
}

// =====================
// CREATE CAMPAIGN
// =====================
function createCampaign(){

 const file=image.files[0];
 if(!file) return alert("Bild fehlt");

 const reader=new FileReader();

 reader.onload=function(e){

 const targeting={
  global:global.checked,
  country:country.checked,
  state:state.checked,
  district:district.checked,
  team:team.checked
 };

 const leagueId=leagueSelect.value;
 const teamId=teamSelect.value;

 const cpm=getCPM(targeting);
 const b=parseFloat(budget.value);

 const c={
  id:Date.now(),
  name:name.value,
  customer:customer.value,
  budget:b,
  spent:0,
  type:type.value,
  cpm,
  impressionsBooked:(b/cpm)*1000,
  impressionsDelivered:0,
  donation:parseFloat(donation.value)||0,
  targeting,

  // 🔥 NEU
  leagueId,
  teamId,

  start:Date.now(),
  end:Date.now()+1000*60*60*24*30,
  image:e.target.result
 };

 const d=getData();
 d.push(c);
 saveData(d);
 render();
 };

 reader.readAsDataURL(file);
}

// =====================
// PACING
// =====================
function shouldServe(c){
 const totalDays=(c.end-c.start)/86400000;
 const passedDays=(Date.now()-c.start)/86400000;
 const expected=(passedDays/totalDays)*c.impressionsBooked;
 return c.impressionsDelivered <= expected*1.2;
}

// =====================
// 🔥 TARGETING MATCH FIX
// =====================
function match(c,ctx){

 // 🔥 TEAM HAT PRIORITÄT
 if(c.teamId){
  return c.teamId === ctx.team;
 }

 if(c.leagueId){
  return c.leagueId === ctx.league;
 }

 if(c.targeting.team) return ctx.team;
 if(c.targeting.district) return ctx.district;
 if(c.targeting.state) return ctx.state;
 if(c.targeting.country) return ctx.country;

 return true;
}

// =====================
// DELIVERY ENGINE
// =====================
function serveAd(ctx={global:true}){

 let data=getData();

 data=data.filter(c=>{
  if(c.type==="TKP"){
   if(c.impressionsDelivered>=c.impressionsBooked) return false;
  }
  return shouldServe(c);
 });

 data=data.filter(c=>match(c,ctx));

 if(!data.length) return null;

 const c=data[Math.floor(Math.random()*data.length)];

 c.impressionsDelivered++;

 if(c.type==="TKP"){
  c.spent+=c.cpm/1000;
 }

 saveData(data);

 return c;
}

// =====================
// UI
// =====================
function render(){

 const d=getData();
 list.innerHTML="";

 d.forEach(c=>{

 const donationVal=c.spent*(c.donation/100);

 const div=document.createElement("div");
 div.className="box";

 div.innerHTML=`
 <b>${c.name}</b><br>
 Budget: €${c.budget}<br>
 Spend: €${c.spent.toFixed(2)}<br>
 Impressions: ${c.impressionsDelivered}/${Math.floor(c.impressionsBooked)}<br>
 Liga: ${c.leagueId || "Global"}<br>
 Team: ${c.teamId || "-"}<br>
 💚 Spende: €${donationVal.toFixed(2)}<br>
 <button onclick="del(${c.id})">❌</button>
 `;

 list.appendChild(div);
 });

}

function del(id){
 let d=getData();
 d=d.filter(x=>x.id!==id);
 saveData(d);
 render();
}

// =====================
// 🎮 GAME HOOK
// =====================
function renderAdToGame(containerId,context){

 const ad=serveAd(context);
 if(!ad) return;

 const el=document.getElementById(containerId);
 if(!el) return;

 el.innerHTML=`<img src="${ad.image}" style="max-width:100%">`;
}

// =====================
// INIT
// =====================
render();
loadLeagues();
</script>

</body>
</html>
