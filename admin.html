<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ad System Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="league.js"></script>
<script src="admin.js" defer></script>

<style>
body{font-family:'Inter';background:#f5f7fb;margin:0}
.container{max-width:1100px;margin:auto;padding:30px}
.box{background:#fff;border-radius:16px;padding:25px;margin-bottom:25px;box-shadow:0 10px 30px rgba(0,0,0,0.05)}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.full{grid-column:1/-1}

input,select{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  width:100%;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:#fff;
  cursor:pointer;
}

.adRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  margin-top:10px;
  background:#fff;
  border-radius:12px;
}

.adLeft{display:flex;gap:10px;align-items:center}
.adRow img{height:50px;border-radius:8px}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Ad Dashboard</h1>

<div class="box">

<h2>Neue Kampagne</h2>

<div class="grid">

<input id="name" placeholder="Kampagnenname">
<input id="customer" placeholder="Kunde">

<input id="budget" type="number" placeholder="Budget €">

<select id="typeCampaign">
<option value="TKP">TKP</option>
<option value="SPONSOR">Sponsor</option>
</select>

<div>
<small>Start</small>
<input type="date" id="startDate">
</div>

<div>
<small>Ende</small>
<input type="date" id="endDate">
</div>

<div class="full">
<small>Targeting</small>
<select id="targetType" onchange="updateTargetingUI()">
<option value="global">Global</option>
<option value="district">Liga</option>
<option value="team">Team</option>
</select>

<div id="targetFields"></div>
</div>

<!-- 💚 SPENDE -->
<select id="donation">
<option value="0">Keine Spende</option>
<option value="1">1% Vereinsspende</option>
<option value="5">5% Vereinsspende</option>
<option value="10">10% Vereinsspende</option>
</select>

<input id="link" placeholder="https://zielseite.de">

<input type="file" id="image" class="full">

<button class="full" onclick="createCampaign()">💾 Speichern</button>

</div>
</div>

<div class="box">
<h2>Kampagnen</h2>
<div id="list"></div>
</div>

</div>

</body>
</html>
