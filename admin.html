<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter', system-ui;
  background:#f5f7fb;
  margin:0;
  color:#111;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.box{
  background:#fff;
  border-radius:16px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.full{grid-column:1/-1}

input,select{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  width:100%;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4285F4;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button.secondary{
  background:#eee;
  color:#111;
}

.adRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  margin-top:10px;
  background:#fff;
  border-radius:12px;
  border:1px solid #eee;
}

.adLeft{
  display:flex;
  gap:15px;
  align-items:center;
}

.adRow img{
  height:50px;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Ad Dashboard</h1>

<div class="box">

<h2>Neue Kampagne</h2>

<div class="grid">

<input id="name" placeholder="Name">
<input id="customer" placeholder="Kunde">

<input id="budget" type="number" placeholder="Budget €">

<select id="typeCampaign">
<option value="TKP">TKP</option>
<option value="SPONSOR">Sponsor</option>
</select>

<!-- 🔥 NEU: Werbeformat -->

<select id="adFormat">
  <option value="banner">Banner</option>
  <option value="preroll">Pre-Roll</option>
  <option value="midroll">Mid-Roll</option>
  <option value="postroll">Post-Roll</option>
  <option value="sponsored">Sponsored</option>
  <option value="presenter">Presenter</option>
</select>

<!-- 🔥 NEU: Pricing -->

<input id="cpm" type="number" placeholder="CPM (€)">
<input id="cpc" type="number" placeholder="CPC (€)">

<input type="date" id="startDate">
<input type="date" id="endDate">

<select id="targetType" onchange="updateTargetingUI()" class="full">
<option value="global">Global</option>
<option value="district">Liga</option>
<option value="team">Team</option>
</select>

<div id="targetFields" class="full"></div>

<select id="donation">
<option value="0">Keine Spende</option>
<option value="1">1%</option>
<option value="5">5%</option>
<option value="10">10%</option>
</select>

<input id="link" placeholder="https://zielseite.de">

<input type="file" id="image" class="full">

<button onclick="createCampaign()" class="full">💾 Speichern</button>

</div>
</div>

<div class="box">
<h2>Kampagnen</h2>

<!-- 🔥 KPI BAR -->

<div id="kpis" style="display:flex; gap:15px; margin-bottom:15px;">
  <div class="stat">👁️ Impressions: <span id="kpiImpressions">0</span></div>
  <div class="stat">🖱 Klicks: <span id="kpiClicks">0</span></div>
  <div class="stat">💰 Umsatz: <span id="kpiRevenue">0€</span></div>
</div>

<div id="list"></div>

</div>

</div>

<!-- ✅ Admin Script -->

<script type="module" src="js/admin.js"></script>

</body>
</html>
