<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ad Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter';
  background:#0f172a;
  color:#fff;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.box{
  background:#1e293b;
  padding:25px;
  border-radius:16px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.full{grid-column:1/-1}

input,select{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#334155;
  color:#fff;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.adRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.adRow img{
  height:50px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Ad Dashboard</h1>

<div class="box">

<h2>Neue Kampagne</h2>

<div class="grid">

<input id="name" placeholder="Name">
<input id="customer" placeholder="Kunde">

<input id="budget" type="number" placeholder="Budget €">

<select id="typeCampaign">
<option value="TKP">TKP</option>
<option value="SPONSOR">Sponsor</option>
</select>

<input type="date" id="startDate">
<input type="date" id="endDate">

<!-- TARGETING -->
<select id="targetType" onchange="updateTargetingUI()" class="full">
<option value="global">Global</option>
<option value="district">Liga</option>
<option value="team">Team</option>
</select>

<div id="targetFields" class="full"></div>

<!-- SPENDE -->
<select id="donation">
<option value="0">Keine Spende</option>
<option value="1">1%</option>
<option value="5">5%</option>
<option value="10">10%</option>
</select>

<input id="link" placeholder="https://zielseite.de">

<input type="file" id="image" class="full">

<button onclick="createCampaign()" class="full">💾 Speichern</button>

</div>
</div>

<div class="box">
<h2>Kampagnen</h2>
<div id="list"></div>
</div>

</div>

<!-- 🔥 WICHTIG: REIHENFOLGE -->
<script src="js/modules/league.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
