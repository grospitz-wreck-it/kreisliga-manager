<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ad System Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="league.js"></script>
<script src="admin.js" defer></script>

<style>
body{
  font-family:'Inter';
  background:#f5f7fb;
  margin:0;
  color:#1a1a1a;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

h1{
  margin-bottom:20px;
}

.box{
  background:#fff;
  border-radius:16px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* GRID FIX */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-bottom:15px;
}

.full{
  grid-column:1 / -1;
}

input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  box-sizing:border-box;
}

input:focus, select:focus{
  outline:none;
  border-color:#4CAF50;
}

/* BUTTONS */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

button.danger{
  background:#e53935;
}

/* TARGET BOX */
#targetFields{
  margin-top:10px;
}

/* LIST */
.adRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.04);
  margin-bottom:10px;
}

.adLeft{
  display:flex;
  gap:15px;
  align-items:center;
}

.adRow img{
  height:50px;
  border-radius:8px;
}

small{
  color:#666;
}

/* MOBILE */
@media(max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Ad System Dashboard</h1>

<div class="box">

<h2>Neue Kampagne</h2>

<div class="grid">

<input id="name" placeholder="Kampagnenname">
<input id="customer" placeholder="Kunde">

<input id="budget" type="number" placeholder="Budget €">

<select id="typeCampaign">
<option value="TKP">TKP</option>
<option value="SPONSOR">Sponsor</option>
</select>

<!-- 📅 DATUM -->
<div>
<small>Startdatum</small>
<input type="date" id="startDate">
</div>

<div>
<small>Enddatum</small>
<input type="date" id="endDate">
</div>

<!-- 🎯 TARGET -->
<div class="full">
<small>Targeting</small>
<select id="targetType" onchange="updateTargetingUI()">
<option value="global">Global</option>
<option value="country">Land</option>
<option value="state">Bundesland</option>
<option value="district">Liga</option>
<option value="team">Team</option>
</select>

<div id="targetFields"></div>
</div>

<input id="donation" type="number" placeholder="Spende %" value="0">

<input type="file" id="image" class="full">

<button class="full" onclick="createCampaign()">💾 Kampagne speichern</button>

</div>

</div>

<div class="box">
<h2>📊 Kampagnen</h2>
<div id="list"></div>
</div>

</div>

</body>
</html>
