<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="container">

<h1>📊 Ad Dashboard</h1>

<!-- ================= KPI ================= -->
<div class="kpiGrid">

  <div class="kpiCard">
    <span>Impressions</span>
    <h2 id="kpiImpressions">0</h2>
  </div>

  <div class="kpiCard">
    <span>Klicks</span>
    <h2 id="kpiClicks">0</h2>
  </div>

  <div class="kpiCard">
    <span>Revenue</span>
    <h2 id="kpiRevenue">0€</h2>
  </div>

</div>

<!-- ================= FORECAST ================= -->
<div class="box">
  <h2>📈 Forecast</h2>

  <div class="forecastGrid">
    <div>
      <span>Monat</span>
      <h3 id="forecastMonth">0€</h3>
    </div>
    <div>
      <span>Jahr</span>
      <h3 id="forecastYear">0€</h3>
    </div>
  </div>

  <div id="revenueBreakdown"></div>
</div>

<!-- ================= CREATE ================= -->
<div class="box">

<h2>Neue Kampagne</h2>

<div class="grid">

<input id="name" placeholder="Name">
<input id="customer" placeholder="Kunde">
<input id="budget" type="number" placeholder="Budget €">

<select id="adFormat">
<option value="banner">Banner</option>
<option value="video">Video</option>
<option value="sponsored">Sponsored</option>
</select>

<input id="cpm" placeholder="CPM €">
<input id="cpc" placeholder="CPC €">

<input type="date" id="startDate">
<input type="date" id="endDate">

<input id="link" placeholder="https://...">

<input type="file" id="image">

<button id="saveBtn" onclick="createCampaign()">💾 Speichern</button>

</div>
</div>

<!-- ================= LIST ================= -->
<div class="box">
<h2>Kampagnen</h2>
<div id="list"></div>
</div>

</div>

<script type="module" src="./admin.js"></script>

</body>
</html>
